<!DOCTYPE html>
<html>
<head>
    <title>Register | Finn AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a237e; display: flex; align-items: center; height: 100vh; }
        .card { border-radius: 15px; margin: auto; width: 400px; }
    </style>
</head>
<body>
    <div class="card p-4 shadow">
        <h3 class="text-center">Join Finn AI</h3>
        <form method="POST">
            <div class="mb-3">
                <label>Choose Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Create Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-success w-100">Create Account</button>
        </form>
        <p class="mt-3 text-center">Have an account? <a href="/login">Login</a></p>
    </div>
</body>
</html>
